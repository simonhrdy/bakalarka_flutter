name: sportmatter
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  auto_route: 9.3.0+1
  bloc: 8.1.4
  dio: 5.7.0
  flutter:
    sdk: flutter
  flutter_bloc: 8.1.6
  flutter_gen: 5.6.0
  flutter_hooks: 0.20.5
  flutter_localizations:
    sdk: flutter
  flutter_svg: 2.0.17
  gap: 3.0.1
  get_it: 8.0.3
  intl: 0.19.0
  pretty_dio_logger: 1.4.0
  provider: 6.1.2
  retrofit: 4.4.2
  shared_preferences: 2.3.5
  json_annotation: 4.9.0
  json_serializable: 6.8.0
  popup_menu_plus: ^0.0.6
  country_icons: ^3.0.0
  font_awesome_flutter: ^10.8.0
  data_table_2: ^2.5.11
  file_picker: ^8.3.7
  dropdown_search: ^5.0.6
  jwt_decoder: ^2.0.1

dev_dependencies:
  auto_route_generator: 9.0.0
  bloc_test: 9.1.7
  build_runner: 2.4.14
  flutter_gen_runner: 5.6.0
  flutter_test:
    sdk: flutter
  mocktail: 1.0.4
  retrofit_generator: 9.1.9
  very_good_analysis: 6.0.0

flutter_gen:
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/


  fonts:
    - family: PermanentMarker
      fonts:
        - asset: assets/fonts/PermanentMarker-Regular.ttf
